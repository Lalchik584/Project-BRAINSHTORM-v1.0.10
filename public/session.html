<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель учителя - МОЗГОШТОРМ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: #1a0033;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    #2a0050 0px,
                    #2a0050 2px,
                    #1a0033 2px,
                    #1a0033 4px
                );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #0a001a;
            border: 4px solid #ffcc00;
            padding: 30px;
            box-shadow: 8px 8px 0 #ffcc00;
            position: relative;
            z-index: 1;
            animation: pixelFadeIn 0.3s steps(5);
        }

        @keyframes pixelFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 1.8em;
            text-align: center;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #7b058c;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #ffffff;
            font-size: 0.6em;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab {
            font-family: 'Press Start 2P', monospace;
            padding: 12px 25px;
            background: #1a0033;
            border: 2px solid #d70bf2;
            color: #ffffff;
            cursor: pointer;
            font-size: 0.6em;
            transition: all 0.05s linear;
        }

        .tab.active {
            background: #7b058c;
            color: #ffcc00;
            border-color: #ffcc00;
            box-shadow: 4px 4px 0 #4a0252;
        }

        .tab:hover:not(.active) {
            background: #d70bf2;
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 #4a0252;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: normal;
            color: #ffcc00;
            font-size: 0.6em;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            background: #1a0033;
            border: 2px solid #d70bf2;
            color: #ffffff;
            font-family: monospace;
            font-size: 0.7em;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #ffcc00;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #1a0033;
            border: 2px solid #d70bf2;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            cursor: pointer;
        }

        select option {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            background: #1a0033;
            color: #ffffff;
            padding: 8px;
        }

        select:focus {
            outline: none;
            border-color: #ffcc00;
        }

        .filter-section select, .filter-section input {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6em;
        }

        #questionCount, #quizCategory {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
        }

        .question-block {
            background: #1a0033;
            border: 2px solid #d70bf2;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 6px solid #ffcc00;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .question-header h3 {
            color: #ffcc00;
            text-shadow: 2px 2px 0 #7b058c;
            font-size: 0.8em;
        }

        .question-type-selector, .time-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-type-selector label, .time-selector label {
            margin-bottom: 0;
            font-size: 0.5em;
        }

        .question-type-selector select, .time-selector select {
            width: auto;
            padding: 8px;
            font-size: 0.6em;
        }

        .options-container {
            margin: 15px 0;
        }

        .option-row {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }

        .option-input {
            flex: 1;
            margin-right: 10px;
        }

        .btn-add-option {
            background: #17a2b8;
            color: white;
            border: 2px solid #ffcc00;
            padding: 8px 15px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.6em;
            margin: 10px 0;
            box-shadow: 3px 3px 0 #0f5c6b;
        }

        .btn-add-option:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #0f5c6b;
        }

        .btn-remove-option {
            background: #dc3545;
            color: white;
            border: 2px solid #ffcc00;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.6em;
            font-family: monospace;
        }

        .btn {
            font-family: 'Press Start 2P', monospace;
            background: #7b058c;
            color: #ffcc00;
            padding: 12px 25px;
            border: 2px solid #ffcc00;
            cursor: pointer;
            font-size: 0.7em;
            margin: 10px 5px;
            transition: all 0.05s linear;
            box-shadow: 4px 4px 0 #4a0252;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #4a0252;
            background: #9b0cac;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #4a0252;
        }

        /* Кнопка НАЧАТЬ СЕССИЮ — ЖЁЛТАЯ с тёмно-фиолетовым текстом */
        .btn-start-session {
            font-family: 'Press Start 2P', monospace;
            background: #ffcc00;
            color: #4a0252;
            padding: 10px 20px;
            border: 2px solid #7b058c;
            cursor: pointer;
            font-size: 0.6em;
            margin: 5px;
            transition: all 0.05s linear;
            box-shadow: 3px 3px 0 #7b058c;
        }

        .btn-start-session:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #7b058c;
            background: #ffe066;
        }

        .btn-start-session:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #7b058c;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #d70bf2;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            font-size: 0.5em;
            margin: 2px;
        }

        .quiz-card {
            background: #1a0033;
            border: 2px solid #d70bf2;
            padding: 20px;
            margin-bottom: 15px;
        }

        .quiz-card h3 {
            color: #ffcc00;
            text-shadow: 2px 2px 0 #7b058c;
            font-size: 0.8em;
            margin-bottom: 10px;
        }

        .quiz-meta {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .quiz-meta span {
            color: #ffffff;
            font-size: 0.5em;
        }

        /* АРТИКУЛ — БОЛЬШОЙ И ЖИРНЫЙ */
        .article-code {
            background: #7b058c;
            color: #ffcc00;
            padding: 8px 12px;
            border: 2px solid #ffcc00;
            font-family: monospace;
            font-size: 0.8em;
            font-weight: bold;
        }

        .success-message {
            background: #28a745;
            color: white;
            padding: 15px;
            border: 2px solid #ffcc00;
            margin: 20px 0;
        }

        .success-message h3, .success-message p {
            color: white;
            font-size: 0.7em;
            margin-bottom: 10px;
        }

        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-section input, .filter-section select {
            flex: 1;
            min-width: 200px;
        }

        /* Заголовок "Все доступные квизы" — БЕЛЫЙ */
        #library-tab h3 {
            color: #ffffff;
            font-size: 0.8em;
            text-align: center;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.2em; }
            .tab { padding: 8px 15px; font-size: 0.5em; }
            .filter-section { flex-direction: column; }
            select { font-size: 0.6em; }
            .article-code { font-size: 0.6em; padding: 5px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="session-header">
            <h1>🎮 УПРАВЛЕНИЕ СЕССИЕЙ</h1>
            <h2 id="quiz-title"></h2>
            <p><span id="quiz-category" class="category-badge"></span></p>
            <div class="session-code" id="session-code">000000</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="students-count">0</div>
                <div class="stat-label">УЧЕНИКОВ</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-questions">0</div>
                <div class="stat-label">ВОПРОСОВ</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="current-question">0</div>
                <div class="stat-label">ТЕКУЩИЙ ВОПРОС</div>
            </div>
        </div>

        <div class="qr-section">
            <h3>📱 QR-КОД ДЛЯ ПОДКЛЮЧЕНИЯ</h3>
            <img id="qr-image" class="qr-code" src="" alt="QR Code">
            <p>Ссылка для учеников: <code id="session-link"></code></p>
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <button class="btn-start" id="start-quiz-btn">🚀 НАЧАТЬ КВИЗ</button>
            <button class="btn btn-warning" id="next-question-btn" style="display: none;">⏭️ СЛЕДУЮЩИЙ ВОПРОС</button>
            <button class="btn btn-danger" id="end-quiz-btn" style="display: none;">🏁 ЗАВЕРШИТЬ</button>
        </div>

        <div id="current-question-display" class="question-block" style="display: none;">
            <h4 id="question-header"></h4>
            <div id="question-detail"></div>
            <div id="question-timer" style="font-size: 1.2em; font-weight: bold; margin: 10px 0; color: #ffcc00;"></div>
            <div id="answer-stats"></div>
        </div>

        <div class="leaderboard" id="leaderboard" style="display: none;">
            <h3>🏆 ТЕКУЩИЕ РЕЗУЛЬТАТЫ</h3>
            <div id="leaderboard-container"></div>
        </div>

        <div class="results-table" id="detailed-results" style="display: none;">
            <h3>📊 ДЕТАЛЬНАЯ СТАТИСТИКА</h3>
            <table id="results-table">
                <thead>
                    <tr>
                        <th>УЧЕНИК</th>
                        <th>БАЛЛЫ</th>
                        <th>% ПРАВ.</th>
                        <th>ОЦЕНКА</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
            
            <h4 style="margin-top: 30px;">📝 ДЕТАЛИ ПО ВОПРОСАМ</h4>
            <div id="question-details-container"></div>
        </div>

        <div class="students-list">
            <h3>👨‍🎓 ПОДКЛЮЧЕННЫЕ УЧЕНИКИ</h3>
            <div id="students-container"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const sessionCode = window.location.pathname.split('/').pop();
        
        let currentQuestionIndex = 0;
        let totalQuestions = 0;
        let questionTimeLeft = 0;
        let timerInterval = null;
        let studentDetails = [];

        socket.emit('teacher-join', sessionCode);

        fetch('/api/sessions/' + sessionCode)
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('quiz-title').textContent = data.session.quiz.title;
                    document.getElementById('quiz-category').textContent = data.session.quiz.categoryName || '📚 ПРЕДМЕТ';
                    document.getElementById('session-code').textContent = data.session.code;
                    document.getElementById('total-questions').textContent = data.session.quiz.questions.length;
                    totalQuestions = data.session.quiz.questions.length;
                    
                    document.getElementById('qr-image').src = '/qr/' + sessionCode;
                    const link = `${window.location.protocol}//${window.location.host}/student.html?session=${sessionCode}`;
                    document.getElementById('session-link').textContent = link;
                    
                    updateStudentsList(data.session.students);
                    document.getElementById('students-count').textContent = data.session.students.length;
                }
            });

        document.getElementById('start-quiz-btn').addEventListener('click', () => {
            socket.emit('start-quiz', sessionCode);
        });

        document.getElementById('next-question-btn').addEventListener('click', () => {
            socket.emit('next-question', sessionCode);
        });

        document.getElementById('end-quiz-btn').addEventListener('click', () => {
            socket.emit('end-quiz', sessionCode);
        });

        socket.on('student-joined', (data) => {
            updateStudentsList([data.student]);
            document.getElementById('students-count').textContent = data.totalStudents;
        });

        socket.on('student-left', (data) => {
            const el = document.getElementById('student-' + data.studentId);
            if (el) el.remove();
            document.getElementById('students-count').textContent = data.totalStudents;
        });

        socket.on('quiz-started', () => {
            document.getElementById('start-quiz-btn').style.display = 'none';
            document.getElementById('next-question-btn').style.display = 'inline-block';
            document.getElementById('end-quiz-btn').style.display = 'inline-block';
            document.getElementById('leaderboard').style.display = 'block';
        });

        socket.on('question-started', (data) => {
            currentQuestionIndex = data.questionIndex;
            document.getElementById('current-question').textContent = currentQuestionIndex + 1;
            document.getElementById('current-question-display').style.display = 'block';
            document.getElementById('question-header').innerHTML = `ВОПРОС ${currentQuestionIndex + 1}: ${data.question.question}`;
            
            questionTimeLeft = data.timeLimit;
            startTimer();
        });

        socket.on('timer-update', (data) => {
            questionTimeLeft = data.timeLeft;
            updateTimerDisplay();
        });

        socket.on('answer-stats', (data) => {
            document.getElementById('answer-stats').innerHTML = `
                <strong>ОТВЕТИЛИ:</strong> ${data.answersReceived}/${data.totalStudents} |
                <strong>ПРАВИЛЬНО:</strong> ${data.correctAnswers} |
                <strong>${Math.round(data.correctAnswers / data.totalStudents * 100) || 0}%</strong>
            `;
        });

        socket.on('leaderboard-update', (data) => {
            updateLeaderboard(data.leaderboard);
        });

        socket.on('detailed-stats', (data) => {
            updateDetailedStats(data);
        });

        socket.on('quiz-ended', (data) => {
            document.getElementById('next-question-btn').style.display = 'none';
            document.getElementById('end-quiz-btn').style.display = 'none';
            document.getElementById('current-question-display').style.display = 'none';
            document.getElementById('detailed-results').style.display = 'block';
            
            if (data.finalResults) {
                updateFinalResults(data.finalResults);
            }
        });

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                questionTimeLeft--;
                updateTimerDisplay();
                if (questionTimeLeft <= 0) clearInterval(timerInterval);
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(questionTimeLeft / 60);
            const secs = questionTimeLeft % 60;
            document.getElementById('question-timer').textContent = 
                `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateStudentsList(students) {
            const container = document.getElementById('students-container');
            students.forEach(student => {
                if (!document.getElementById('student-' + student.id)) {
                    const el = document.createElement('div');
                    el.className = 'student-item';
                    el.id = 'student-' + student.id;
                    el.innerHTML = `
                        <div>
                            <strong>${student.name}</strong>
                            <div style="color: #aaa; font-size: 0.6em; margin-top: 5px;">
                                ${new Date(student.joinedAt).toLocaleTimeString()}
                            </div>
                        </div>
                        <div class="score-badge" id="score-${student.id}">0</div>
                    `;
                    container.appendChild(el);
                }
            });
        }

        function updateLeaderboard(leaderboard) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = '';
            
            leaderboard.sort((a, b) => b.score - a.score).forEach((student, idx) => {
                const el = document.createElement('div');
                el.className = 'leaderboard-item';
                el.innerHTML = `
                    <div>
                        <span class="position">${idx + 1}.</span>
                        ${student.name}
                    </div>
                    <div class="score-badge">${student.score} ОЧКОВ</div>
                `;
                container.appendChild(el);
                
                const scoreEl = document.getElementById('score-' + student.studentId);
                if (scoreEl) scoreEl.textContent = student.score;
            });
        }

        function calculateGrade(percentage) {
            if (percentage < 25) return { text: '2 (НЕУД)', class: 'grade-2' };
            if (percentage < 50) return { text: '3 (УДОВЛ)', class: 'grade-3' };
            if (percentage < 80) return { text: '4 (ХОРОШО)', class: 'grade-4' };
            return { text: '5 (ОТЛИЧНО)', class: 'grade-5' };
        }

        function updateDetailedStats(data) {
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';
            
            data.studentDetails.forEach(student => {
                const totalQuestionsCount = data.questions.length;
                const correctCount = student.answers.filter(a => a.isCorrect).length;
                const percentage = totalQuestionsCount > 0 ? Math.round(correctCount / totalQuestionsCount * 100) : 0;
                const grade = calculateGrade(percentage);
                const studentName = student.name || `УЧЕНИК ${student.studentId?.slice(0, 6) || '?'}`;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${studentName}</strong></td>
                    <td>${student.score}</td>
                    <td>${percentage}% (${correctCount}/${totalQuestionsCount})</td>
                    <td><span class="grade-badge ${grade.class}">${grade.text}</span></td>
                `;
                tbody.appendChild(row);
            });
            
            let tableHtml = `
                <table class="details-table">
                    <thead>
                        <tr>
                            <th style="text-align: left;">УЧЕНИК</th>
            `;
            
            for (let i = 0; i < data.questions.length; i++) {
                tableHtml += `<th>ВОПРОС ${i+1}</th>`;
            }
            tableHtml += `<tr></thead><tbody>`;
            
            data.studentDetails.forEach(student => {
                const studentName = student.name || `УЧЕНИК ${student.studentId?.slice(0, 6) || '?'}`;
                tableHtml += `<tr>`;
                tableHtml += `<td style="text-align: left; font-weight: bold;">${studentName}</td>`;
                
                for (let i = 0; i < data.questions.length; i++) {
                    const answer = student.answers.find(a => a.questionIndex === i);
                    let cell = '';
                    let cellClass = '';
                    
                    if (answer) {
                        if (answer.isCorrect) {
                            cell = '✅';
                            cellClass = 'cell-correct';
                        } else {
                            cell = '❌';
                            cellClass = 'cell-wrong';
                        }
                    } else {
                        cell = '⏳';
                        cellClass = 'cell-missed';
                    }
                    
                    tableHtml += `<td class="${cellClass}">${cell}</td>`;
                }
                tableHtml += `</tr>`;
            });
            
            tableHtml += `</tbody></table>`;
            document.getElementById('question-details-container').innerHTML = tableHtml;
        }

        function updateFinalResults(finalResults) {
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';
            
            finalResults.forEach(student => {
                const totalQuestionsCount = finalResults[0]?.answers?.length || 0;
                const correctCount = student.answers?.filter(a => a.isCorrect).length || 0;
                const percentage = totalQuestionsCount > 0 ? Math.round(correctCount / totalQuestionsCount * 100) : 0;
                const grade = calculateGrade(percentage);
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${student.name}</strong></td>
                    <td>${student.score}</td>
                    <td>${percentage}%</td>
                    <td><span class="grade-badge ${grade.class}">${grade.text}</span></td>
                `;
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
