<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ученик - МОЗГОШТОРМ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: #1a0033;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    #2a0050 0px,
                    #2a0050 2px,
                    #1a0033 2px,
                    #1a0033 4px
                );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #0a001a;
            border: 4px solid #ffcc00;
            padding: 30px;
            box-shadow: 8px 8px 0 #ffcc00;
            position: relative;
            z-index: 1;
            animation: pixelFadeIn 0.3s steps(5);
        }

        @keyframes pixelFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 2em;
            text-align: center;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #7b058c;
            margin-bottom: 10px;
        }

        h2, h3 {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .subtitle {
            text-align: center;
            color: #ffffff;
            font-size: 0.6em;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: normal;
            color: #ffcc00;
            font-size: 0.7em;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #1a0033;
            border: 2px solid #d70bf2;
            color: #ffffff;
            font-family: monospace;
            font-size: 0.8em;
        }

        input:focus {
            outline: none;
            border-color: #ffcc00;
        }

        .btn {
            font-family: 'Press Start 2P', monospace;
            background: #7b058c;
            color: #ffcc00;
            padding: 12px 25px;
            border: 2px solid #ffcc00;
            cursor: pointer;
            font-size: 0.7em;
            width: 100%;
            transition: all 0.05s linear;
            box-shadow: 4px 4px 0 #4a0252;
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #4a0252;
            background: #9b0cac;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #4a0252;
        }

        .waiting-room, .quiz-room, .results-room {
            display: none;
        }

        .student-list {
            margin: 20px 0;
        }

        .student-item {
            padding: 10px;
            margin: 5px 0;
            background: #1a0033;
            border: 2px solid #d70bf2;
            color: #ffffff;
            font-size: 0.6em;
        }

        .quiz-info {
            background: #1a0033;
            border: 2px solid #d70bf2;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .quiz-info h2 {
            color: #ffcc00;
            text-shadow: 2px 2px 0 #7b058c;
        }

        .quiz-info p {
            color: #ffffff;
            font-size: 0.6em;
            margin-top: 10px;
        }

        .timer {
            font-size: 2.5em;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #1a0033;
            border: 3px solid #ffcc00;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #7b058c;
        }

        .timer.warning {
            border-color: #ffc107;
            color: #ffc107;
        }

        .timer.danger {
            border-color: #dc3545;
            color: #dc3545;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .question-text {
            font-size: 0.8em;
            font-weight: normal;
            margin: 30px 0;
            color: #ffffff;
            line-height: 1.5;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            background: #1a0033;
            border: 2px solid #d70bf2;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.7em;
            transition: all 0.05s linear;
            margin: 5px 0;
            color: #ffffff;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #ffcc00;
            background: #7b058c;
        }

        .option-btn.selected {
            border-color: #ffcc00;
            background: #d70bf2;
            color: #ffcc00;
        }

        .option-btn.correct {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }

        .option-btn.wrong {
            border-color: #dc3545;
            background: #dc3545;
            color: white;
        }

        .answer-feedback {
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
            font-size: 0.6em;
        }

        .answer-correct {
            background: #28a745;
            color: white;
            border: 2px solid #ffcc00;
        }

        .answer-wrong {
            background: #dc3545;
            color: white;
            border: 2px solid #ffcc00;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #1a0033;
            border: 1px solid #d70bf2;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ffcc00;
            transition: width 0.3s;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #1a0033;
            border: 2px solid #d70bf2;
            padding: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #7b058c;
        }

        .stat-label {
            color: #ffffff;
            font-size: 0.5em;
            margin-top: 5px;
        }

        .change-btn {
            background: #ffc107;
            color: #333;
            border: 2px solid #ffcc00;
            padding: 8px 15px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.6em;
            margin-top: 10px;
            width: 100%;
        }

        .change-btn:hover {
            background: #ffcc00;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #d70bf2;
            color: #ffcc00;
            border: 2px solid #ffcc00;
            font-size: 0.5em;
            margin: 5px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.2em; }
            .timer { font-size: 1.5em; }
            .question-text { font-size: 0.6em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="join-section">
            <h1>👨‍🎓 Вход в квиз</h1>
            <div class="subtitle">Введите код сессии и ваше имя</div>
            <div class="form-group">
                <label>Код сессии:</label>
                <input type="text" id="sessionCode" placeholder="6-значный код" maxlength="6">
            </div>
            <div class="form-group">
                <label>Ваше имя:</label>
                <input type="text" id="studentName" placeholder="Например: Иван Петров">
            </div>
            <button class="btn" onclick="joinSession()">🔑 Войти</button>
        </div>

        <div id="waiting-room" class="waiting-room">
            <h1>⏳ Ожидание начала</h1>
            <div class="quiz-info" id="quiz-info">
                <h2 id="quiz-title"></h2>
                <p><span id="quiz-category" class="category-badge"></span></p>
                <p>📊 <span id="quiz-questions-count"></span> вопросов</p>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="waiting-count">0</div>
                    <div class="stat-label">учеников в сети</div>
                </div>
            </div>
            <div id="students-list" class="student-list"></div>
        </div>

        <div id="quiz-room" class="quiz-room">
            <div class="quiz-header">
                <h2 id="quiz-title-display"></h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="score-display">0</div>
                        <div class="stat-label">очков</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="progress-display">0/0</div>
                        <div class="stat-label">вопросов</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
                </div>
            </div>
            <div class="timer" id="timer">30</div>
            <div class="question-text" id="question-text"></div>
            <div id="options-container"></div>
            <div id="feedback-container"></div>
            <button class="change-btn" id="change-answer-btn" onclick="unlockAnswer()" style="display: none;">🔄 Изменить ответ</button>
        </div>

        <div id="results-room" class="results-room">
            <h1>🏁 Квиз завершен!</h1>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="final-score">0</div>
                    <div class="stat-label">итоговый счет</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="final-correct">0</div>
                    <div class="stat-label">правильных</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="final-wrong">0</div>
                    <div class="stat-label">ошибок</div>
                </div>
            </div>
            <div id="results-details" style="margin: 30px 0;"></div>
            <button class="btn" onclick="location.reload()">🔄 Новый квиз</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let sessionCode = '';
        let studentId = '';
        let studentName = '';
        let currentQuestionIndex = 0;
        let totalQuestions = 0;
        let selectedAnswer = null;
        let selectedAnswerText = '';
        let answerLocked = false;
        let questionType = 'single';
        let score = 0;
        let answers = [];
        let timerInterval = null;
        let serverTimeLeft = 0;
        let lastServerUpdate = Date.now();
        let timeLimit = 30;

        // ========== СОХРАНЕНИЕ И ВОССТАНОВЛЕНИЕ ==========
        function saveSessionState() {
            // Сохраняем только идентификаторы, НЕ сохраняем score и answers
            const state = {
                sessionCode: sessionCode,
                studentName: studentName,
                studentId: studentId,
                currentQuestionIndex: currentQuestionIndex
            };
            localStorage.setItem('quizSession', JSON.stringify(state));
        }

        function loadSessionState() {
            const saved = localStorage.getItem('quizSession');
            if (!saved) return null;
            return JSON.parse(saved);
        }

        function clearSessionState() {
            localStorage.removeItem('quizSession');
        }

        // ========== ВХОД ==========
        function joinSession() {
            // Очищаем старую сессию при новом входе
            clearSessionState();
            
            sessionCode = document.getElementById('sessionCode').value.trim();
            studentName = document.getElementById('studentName').value.trim();
            
            if (!sessionCode || !studentName) {
                alert('Введите код и имя');
                return;
            }
            
            if (sessionCode.length !== 6) {
                alert('Код должен быть 6-значным');
                return;
            }
            
            fetch('/api/sessions/' + sessionCode)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('quiz-title').textContent = data.session.quiz.title;
                        document.getElementById('quiz-questions-count').textContent = data.session.quiz.questions.length;
                        document.getElementById('quiz-category').textContent = data.session.quiz.categoryName || '📚 Предмет';
                        totalQuestions = data.session.quiz.questions.length;
                        
                        socket.emit('student-join', { sessionCode, studentName });
                        
                        document.getElementById('join-section').style.display = 'none';
                        document.getElementById('waiting-room').style.display = 'block';
                        
                        data.session.students.forEach(s => addStudentToList(s));
                        document.getElementById('waiting-count').textContent = data.session.students.length;
                    } else {
                        alert('Сессия не найдена');
                    }
                });
        }

        function addStudentToList(student) {
            const list = document.getElementById('students-list');
            const el = document.createElement('div');
            el.className = 'student-item';
            el.id = 'student-' + student.id;
            el.textContent = `👤 ${student.name}`;
            list.appendChild(el);
        }

        // ========== СОКЕТЫ ==========
        socket.on('student-joined', (data) => {
            if (!document.getElementById('student-' + data.student.id)) {
                addStudentToList(data.student);
            }
            document.getElementById('waiting-count').textContent = data.totalStudents;
        });

        socket.on('student-left', (data) => {
            const el = document.getElementById('student-' + data.studentId);
            if (el) el.remove();
            document.getElementById('waiting-count').textContent = data.totalStudents;
        });

        socket.on('quiz-started', () => {
            document.getElementById('waiting-room').style.display = 'none';
            document.getElementById('quiz-room').style.display = 'block';
            document.getElementById('quiz-title-display').textContent = document.getElementById('quiz-title').textContent;
        });

        socket.on('question-started', (data) => {
            currentQuestionIndex = data.questionIndex;
            questionType = data.question.type || 'single';
            timeLimit = data.timeLimit;
            
            selectedAnswer = null;
            selectedAnswerText = '';
            answerLocked = false;
            document.getElementById('change-answer-btn').style.display = 'none';
            
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-display').textContent = `${currentQuestionIndex + 1}/${totalQuestions}`;
            
            document.getElementById('question-text').innerHTML = `
                <div style="color: #667eea; font-weight: bold; margin-bottom: 10px;">
                    ${questionType === 'multiple' ? '📋 Выберите несколько вариантов' : '🔘 Выберите один вариант'}
                </div>
                ${data.question.question}
            `;
            
            const optionsDiv = document.getElementById('options-container');
            optionsDiv.innerHTML = '';
            
            data.question.options.forEach((opt, idx) => {
                if (questionType === 'single') {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = `${String.fromCharCode(65 + idx)}. ${opt}`;
                    btn.onclick = () => selectAnswer(idx, opt, btn);
                    optionsDiv.appendChild(btn);
                }
            });
            
            if (timeLimit > 0) {
                serverTimeLeft = timeLimit;
                lastServerUpdate = Date.now();
                startLocalTimer();
            } else {
                document.getElementById('timer').textContent = '∞';
            }
        });

        socket.on('timer-update', (data) => {
            serverTimeLeft = data.timeLeft;
            lastServerUpdate = Date.now();
        });

        socket.on('question-ended', (data) => {
            clearInterval(timerInterval);
            
            const options = document.querySelectorAll('.option-btn');
            options.forEach((btn, idx) => {
                const text = btn.textContent.substring(3);
                if (text === data.correctAnswer) {
                    btn.classList.add('correct');
                } else if (btn.classList.contains('selected')) {
                    btn.classList.add('wrong');
                }
                btn.disabled = true;
            });
            
            const isCorrect = selectedAnswerText === data.correctAnswer;
            const feedback = document.getElementById('feedback-container');
            
            if (isCorrect) {
                score += 10;
                document.getElementById('score-display').textContent = score;
                answers[currentQuestionIndex] = true;
                feedback.innerHTML = '<div class="answer-feedback answer-correct">✅ Правильно! +10 очков</div>';
            } else if (selectedAnswer !== null) {
                answers[currentQuestionIndex] = false;
                feedback.innerHTML = `<div class="answer-feedback answer-wrong">❌ Неправильно! Правильный ответ: ${data.correctAnswer}</div>`;
            } else {
                answers[currentQuestionIndex] = false;
                feedback.innerHTML = `<div class="answer-feedback answer-wrong">⏰ Время вышло! Правильный ответ: ${data.correctAnswer}</div>`;
            }
        });

        socket.on('quiz-ended', (data) => {
            document.getElementById('quiz-room').style.display = 'none';
            document.getElementById('results-room').style.display = 'block';
            
            const correctCount = answers.filter(a => a === true).length;
            const wrongCount = totalQuestions - correctCount;
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-correct').textContent = correctCount;
            document.getElementById('final-wrong').textContent = wrongCount;
            
            let detailsHtml = '<h3>📊 Детали:</h3><div class="student-list">';
            for (let i = 0; i < totalQuestions; i++) {
                const answered = answers[i] !== undefined;
                detailsHtml += `
                    <div class="student-item">
                        <strong>Вопрос ${i+1}:</strong> 
                        ${answered ? (answers[i] ? '✅' : '❌') : '⏰ Пропущен'}
                    </div>
                `;
            }
            detailsHtml += '</div>';
            document.getElementById('results-details').innerHTML = detailsHtml;
            
            clearSessionState();
        });

        socket.on('score-update', (data) => {
            score = data.score;
            document.getElementById('score-display').textContent = score;
        });

        socket.on('waiting-room', (data) => {
            document.getElementById('quiz-title-display').textContent = data.quizTitle;
            document.getElementById('waiting-room').style.display = 'block';
            document.getElementById('quiz-room').style.display = 'none';
            document.getElementById('waiting-count').textContent = data.studentsCount || 0;
            // Очищаем список учеников, чтобы потом обновить
            document.getElementById('students-list').innerHTML = '';
        });

        socket.on('error', (data) => {
            console.error('Ошибка:', data.message);
            if (data.message === 'Сессия не найдена') {
                clearSessionState();
                alert('Сессия не найдена. Пожалуйста, войдите заново.');
                location.reload();
            }
        });

        // ========== ТАЙМЕР ==========
        function startLocalTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLimit === 0) return;
                const elapsed = Math.floor((Date.now() - lastServerUpdate) / 1000);
                const displayTime = Math.max(0, serverTimeLeft - elapsed);
                updateTimerDisplay(displayTime);
                if (displayTime <= 0 && timerInterval) {
                    clearInterval(timerInterval);
                }
            }, 100);
        }

        function updateTimerDisplay(time) {
            const timerEl = document.getElementById('timer');
            timerEl.textContent = time;
            timerEl.classList.remove('warning', 'danger');
            if (time <= 10 && time > 0) {
                timerEl.classList.add('danger');
            } else if (time <= 20) {
                timerEl.classList.add('warning');
            }
        }

        // ========== ОТВЕТЫ ==========
        function selectAnswer(index, text, btn) {
            if (answerLocked) return;
            
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAnswer = index;
            selectedAnswerText = text;
            
            if (timeLimit === 0) {
                document.getElementById('change-answer-btn').style.display = 'block';
            } else {
                lockAnswer();
            }
        }

        function lockAnswer() {
            answerLocked = true;
            document.getElementById('change-answer-btn').style.display = 'none';
            
            socket.emit('student-answer', {
                sessionCode,
                questionIndex: currentQuestionIndex,
                answerIndex: selectedAnswer,
                answerText: selectedAnswerText,
                timeLeft: serverTimeLeft
            });
        }

        function unlockAnswer() {
            answerLocked = false;
            document.getElementById('change-answer-btn').style.display = 'none';
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            selectedAnswer = null;
            selectedAnswerText = '';
        }

        // ========== ВОССТАНОВЛЕНИЕ ПРИ ЗАГРУЗКЕ ==========
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Очистка по параметру ?clear=true
            if (urlParams.get('clear')) {
                localStorage.clear();
                console.log('🧹 LocalStorage очищен');
            }
            
            const saved = loadSessionState();
            if (saved && saved.sessionCode) {
                // Проверяем, существует ли сессия на сервере
                fetch('/api/sessions/' + saved.sessionCode)
                    .then(r => r.json())
                    .then(data => {
                        if (data.success && data.session.status === 'active') {
                            // Сессия активна — восстанавливаем
                            sessionCode = saved.sessionCode;
                            studentName = saved.studentName;
                            studentId = saved.studentId;
                            currentQuestionIndex = saved.currentQuestionIndex;
                            
                            socket.emit('student-rejoin', {
                                sessionCode: sessionCode,
                                studentId: studentId,
                                studentName: studentName,
                                currentQuestionIndex: currentQuestionIndex
                            });
                            
                            document.getElementById('join-section').style.display = 'none';
                            document.getElementById('quiz-room').style.display = 'block';
                            document.getElementById('quiz-title-display').textContent = 'Восстановление...';
                        } else {
                            // Сессия не активна — очищаем сохранённое
                            clearSessionState();
                            console.log('Сессия не активна, очищаем');
                        }
                    })
                    .catch(() => {
                        clearSessionState();
                    });
            }
        });

        // Автозаполнение из URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('session')) {
            document.getElementById('sessionCode').value = urlParams.get('session');
            document.getElementById('studentName').focus();
        }
    </script>
</body>
</html>
