<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ученик - BRAINSHTORM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .waiting-room, .quiz-room, .results-room {
            display: none;
        }
        .student-list {
            margin: 20px 0;
        }
        .student-item {
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        .quiz-info {
            background: #e8f4fd;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .timer {
            font-size: 3em;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            border: 3px solid #667eea;
            transition: all 0.3s;
        }
        .timer.warning {
            border-color: #ffc107;
            background: #fff3cd;
            color: #856404;
        }
        .timer.danger {
            border-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .question-text {
            font-size: 1.4em;
            font-weight: 600;
            margin: 30px 0;
            color: #333;
        }
        .option-item {
            margin: 10px 0;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 15px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f8f9fa;
        }
        .option-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .option-btn.correct {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
        }
        .option-btn.wrong {
            border-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
        }
        .answer-feedback {
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .answer-correct {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }
        .answer-wrong {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
        }
        .change-btn {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .change-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .category-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Вход -->
        <div id="join-section">
            <h1>👨‍🎓 Вход в квиз</h1>
            <div class="subtitle">Введите код сессии и ваше имя</div>
            <div class="form-group">
                <label>Код сессии:</label>
                <input type="text" id="sessionCode" placeholder="6-значный код" maxlength="6">
            </div>
            <div class="form-group">
                <label>Ваше имя:</label>
                <input type="text" id="studentName" placeholder="Например: Иван Петров">
            </div>
            <button class="btn" onclick="joinSession()">🔑 Войти</button>
        </div>

        <!-- Комната ожидания -->
        <div id="waiting-room" class="waiting-room">
            <h1>⏳ Ожидание начала</h1>
            <div class="quiz-info" id="quiz-info">
                <h2 id="quiz-title"></h2>
                <p><span id="quiz-category" class="category-badge"></span></p>
                <p>📊 <span id="quiz-questions-count"></span> вопросов</p>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="waiting-count">0</div>
                    <div class="stat-label">учеников в сети</div>
                </div>
            </div>
            <div id="students-list" class="student-list"></div>
        </div>

        <!-- Комната квиза -->
        <div id="quiz-room" class="quiz-room">
            <div class="quiz-header">
                <h2 id="quiz-title-display"></h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="score-display">0</div>
                        <div class="stat-label">очков</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="progress-display">0/0</div>
                        <div class="stat-label">вопросов</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="timer" id="timer">30</div>
            
            <div class="question-text" id="question-text"></div>
            
            <div id="options-container"></div>
            
            <div id="feedback-container"></div>
            
            <button class="change-btn" id="change-answer-btn" onclick="unlockAnswer()" style="display: none;">🔄 Изменить ответ</button>
        </div>

        <!-- Результаты -->
        <div id="results-room" class="results-room">
            <h1>🏁 Квиз завершен!</h1>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="final-score">0</div>
                    <div class="stat-label">итоговый счет</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="final-correct">0</div>
                    <div class="stat-label">правильных</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="final-wrong">0</div>
                    <div class="stat-label">ошибок</div>
                </div>
            </div>
            
            <div id="results-details" style="margin: 30px 0;"></div>
            
            <button class="btn" onclick="location.reload()">🔄 Новый квиз</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let sessionCode = '';
        let studentId = '';
        let studentName = '';
        let currentQuestionIndex = 0;
        let totalQuestions = 0;
        let selectedAnswer = null;
        let answerLocked = false;
        let questionType = 'single';
        let score = 0;
        let answers = [];
        let timerInterval = null;
        let serverTimeLeft = 0;
        let lastServerUpdate = Date.now();
        let timeLimit = 30;

        function joinSession() {
            sessionCode = document.getElementById('sessionCode').value.trim();
            studentName = document.getElementById('studentName').value.trim();
            
            if (!sessionCode || !studentName) {
                alert('Введите код и имя');
                return;
            }
            
            if (sessionCode.length !== 6) {
                alert('Код должен быть 6-значным');
                return;
            }
            
            fetch('/api/sessions/' + sessionCode)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('quiz-title').textContent = data.session.quiz.title;
                        document.getElementById('quiz-questions-count').textContent = data.session.quiz.questions.length;
                        document.getElementById('quiz-category').textContent = data.session.quiz.categoryName || '📚 Предмет';
                        totalQuestions = data.session.quiz.questions.length;
                        
                        socket.emit('student-join', { sessionCode, studentName });
                        
                        document.getElementById('join-section').style.display = 'none';
                        document.getElementById('waiting-room').style.display = 'block';
                        
                        data.session.students.forEach(s => addStudentToList(s));
                        document.getElementById('waiting-count').textContent = data.session.students.length;
                    } else {
                        alert('Сессия не найдена');
                    }
                });
        }

        function addStudentToList(student) {
            const list = document.getElementById('students-list');
            const el = document.createElement('div');
            el.className = 'student-item';
            el.id = 'student-' + student.id;
            el.textContent = `👤 ${student.name}`;
            list.appendChild(el);
        }

        socket.on('student-joined', (data) => {
            if (!document.getElementById('student-' + data.student.id)) {
                addStudentToList(data.student);
            }
            document.getElementById('waiting-count').textContent = data.totalStudents;
        });

        socket.on('student-left', (data) => {
            const el = document.getElementById('student-' + data.studentId);
            if (el) el.remove();
            document.getElementById('waiting-count').textContent = data.totalStudents;
        });

        socket.on('quiz-started', () => {
            document.getElementById('waiting-room').style.display = 'none';
            document.getElementById('quiz-room').style.display = 'block';
            document.getElementById('quiz-title-display').textContent = document.getElementById('quiz-title').textContent;
        });

        socket.on('question-started', (data) => {
            currentQuestionIndex = data.questionIndex;
            questionType = data.question.type || 'single';
            timeLimit = data.timeLimit;
            
            selectedAnswer = null;
            answerLocked = false;
            document.getElementById('change-answer-btn').style.display = 'none';
            
            const progress = ((currentQuestionIndex + 1) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-display').textContent = `${currentQuestionIndex + 1}/${totalQuestions}`;
            
            document.getElementById('question-text').innerHTML = `
                <div style="color: #667eea; font-weight: bold; margin-bottom: 10px;">
                    ${questionType === 'multiple' ? '📋 Выберите несколько вариантов' : '🔘 Выберите один вариант'}
                </div>
                ${data.question.question}
            `;
            
            const optionsDiv = document.getElementById('options-container');
            optionsDiv.innerHTML = '';
            
            data.question.options.forEach((opt, idx) => {
                if (questionType === 'single') {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = `${String.fromCharCode(65 + idx)}. ${opt}`;
                    btn.onclick = () => selectAnswer(idx, btn);
                    optionsDiv.appendChild(btn);
                }
            });
            
            if (timeLimit > 0) {
                serverTimeLeft = timeLimit;
                lastServerUpdate = Date.now();
                startLocalTimer();
            } else {
                document.getElementById('timer').textContent = '∞';
            }
        });

        socket.on('timer-update', (data) => {
            serverTimeLeft = data.timeLeft;
            lastServerUpdate = Date.now();
        });

        function startLocalTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLimit === 0) return;
                
                const elapsed = Math.floor((Date.now() - lastServerUpdate) / 1000);
                const displayTime = Math.max(0, serverTimeLeft - elapsed);
                
                updateTimerDisplay(displayTime);
                
                if (displayTime <= 0 && timerInterval) {
                    clearInterval(timerInterval);
                }
            }, 100);
        }

        function updateTimerDisplay(time) {
            const timerEl = document.getElementById('timer');
            timerEl.textContent = time;
            
            timerEl.classList.remove('warning', 'danger');
            if (time <= 10 && time > 0) {
                timerEl.classList.add('danger');
            } else if (time <= 20) {
                timerEl.classList.add('warning');
            }
        }

        function selectAnswer(index, btn) {
            if (answerLocked) return;
            
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAnswer = index;
            
            if (timeLimit === 0) {
                document.getElementById('change-answer-btn').style.display = 'block';
            } else {
                lockAnswer();
            }
        }

        function lockAnswer() {
            answerLocked = true;
            document.getElementById('change-answer-btn').style.display = 'none';
            
            socket.emit('student-answer', {
                sessionCode,
                questionIndex: currentQuestionIndex,
                answerIndex: selectedAnswer,
                timeLeft: serverTimeLeft
            });
        }

        function unlockAnswer() {
            answerLocked = false;
            document.getElementById('change-answer-btn').style.display = 'none';
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        }

        socket.on('question-ended', (data) => {
            clearInterval(timerInterval);
            
            const options = document.querySelectorAll('.option-btn');
            options.forEach((btn, idx) => {
                const text = btn.textContent.substring(3);
                if (text === data.correctAnswer) {
                    btn.classList.add('correct');
                } else if (btn.classList.contains('selected')) {
                    btn.classList.add('wrong');
                }
                btn.disabled = true;
            });
            
            const isCorrect = options[selectedAnswer]?.textContent.includes(data.correctAnswer);
            
            const feedback = document.getElementById('feedback-container');
            
            if (isCorrect) {
                score += 10;
                document.getElementById('score-display').textContent = score;
                answers[currentQuestionIndex] = true;
                feedback.innerHTML = '<div class="answer-feedback answer-correct">✅ Правильно! +10 очков</div>';
            } else if (selectedAnswer !== null) {
                answers[currentQuestionIndex] = false;
                feedback.innerHTML = `<div class="answer-feedback answer-wrong">❌ Неправильно! Правильный ответ: ${data.correctAnswer}</div>`;
            } else {
                answers[currentQuestionIndex] = false;
                feedback.innerHTML = `<div class="answer-feedback answer-wrong">⏰ Время вышло! Правильный ответ: ${data.correctAnswer}</div>`;
            }
        });

        socket.on('quiz-ended', (data) => {
            document.getElementById('quiz-room').style.display = 'none';
            document.getElementById('results-room').style.display = 'block';
            
            const correctCount = answers.filter(a => a).length;
            const wrongCount = totalQuestions - correctCount;
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-correct').textContent = correctCount;
            document.getElementById('final-wrong').textContent = wrongCount;
            
            let detailsHtml = '<h3>📊 Детали:</h3><div class="student-list">';
            for (let i = 0; i < totalQuestions; i++) {
                const answered = answers[i] !== undefined;
                detailsHtml += `
                    <div class="student-item">
                        <strong>Вопрос ${i+1}:</strong> 
                        ${answered ? (answers[i] ? '✅' : '❌') : '⏰ Пропущен'}
                    </div>
                `;
            }
            detailsHtml += '</div>';
            document.getElementById('results-details').innerHTML = detailsHtml;
        });

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('session')) {
            document.getElementById('sessionCode').value = urlParams.get('session');
            document.getElementById('studentName').focus();
        }
    </script>
</body>
</html>
