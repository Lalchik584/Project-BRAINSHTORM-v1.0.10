<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель учителя - BRAINSHTORM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 15px 30px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .question-block {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .question-type-selector, .time-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .question-type-selector select, .time-selector select {
            width: auto;
            padding: 8px;
        }
        .options-container {
            margin: 15px 0;
        }
        .option-row {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }
        .option-input {
            flex: 1;
            margin-right: 10px;
        }
        .btn-add-option {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn-remove-option {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s;
            margin: 10px 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-secondary {
            background: #6c757d;
        }
        .category-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
            margin: 2px;
        }
        .quiz-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .quiz-card h3 {
            margin-bottom: 10px;
        }
        .quiz-meta {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .article-code {
            background: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-section select, .filter-section input {
            flex: 1;
            min-width: 200px;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .tab { padding: 12px 20px; }
            .filter-section { flex-direction: column; }
        }
    </style>
</head>

    <script>
        let currentQuestionCount = 1;

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
            
            if (tabName === 'library') {
                loadAllQuizzes();
            }
        }

        function generateQuestionFields() {
            const count = parseInt(document.getElementById('questionCount').value);
            currentQuestionCount = count;
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            for (let i = 1; i <= count; i++) {
                container.innerHTML += `
                    <div class="question-block" id="q-${i}">
                        <div class="question-header">
                            <h3>Вопрос ${i}</h3>
                            <div class="question-type-selector">
                                <label>Тип:</label>
                                <select onchange="changeType(${i})" id="type-${i}">
                                    <option value="single">Один ответ</option>
                                    <option value="multiple">Несколько ответов</option>
                                </select>
                            </div>
                            <div class="time-selector">
                                <label>Время:</label>
                                <select id="time-${i}">
                                    <option value="30">30 сек</option>
                                    <option value="60">60 сек</option>
                                    <option value="120">2 мин</option>
                                    <option value="180">3 мин</option>
                                    <option value="0">Без таймера</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Текст вопроса:</label>
                            <textarea id="question-${i}" rows="2" placeholder="Введите вопрос"></textarea>
                        </div>
                        
                        <div class="options-container" id="options-${i}"></div>
                        
                        <button class="btn-add-option" onclick="addOption(${i})">➕ Добавить вариант</button>
                        
                        <div id="correct-${i}" class="correct-section" style="margin-top: 15px;"></div>
                    </div>
                `;
                
                for (let j = 0; j < 4; j++) {
                    addOption(i);
                }
                updateCorrectSection(i, 'single');
            }
        }

        function changeType(questionNum) {
            const type = document.getElementById(`type-${questionNum}`).value;
            updateCorrectSection(questionNum, type);
        }

        function addOption(questionNum) {
            const container = document.getElementById(`options-${questionNum}`);
            const count = container.children.length;
            const optionDiv = document.createElement('div');
            optionDiv.className = 'option-row';
            optionDiv.innerHTML = `
                <input type="text" class="option-input" placeholder="Вариант ${String.fromCharCode(65 + count)}" oninput="updateCorrectSection(${questionNum})">
                <button class="btn-remove-option" onclick="removeOption(this, ${questionNum})" ${count < 2 ? 'disabled' : ''}>✕</button>
            `;
            container.appendChild(optionDiv);
            updateCorrectSection(questionNum);
        }

        function removeOption(btn, questionNum) {
            const container = document.getElementById(`options-${questionNum}`);
            if (container.children.length > 2) {
                btn.parentElement.remove();
                updateCorrectSection(questionNum);
            }
        }

        function updateCorrectSection(questionNum) {
            const type = document.getElementById(`type-${questionNum}`).value;
            const options = document.querySelectorAll(`#options-${questionNum} .option-input`);
            const container = document.getElementById(`correct-${questionNum}`);
            
            let html = '<label>Правильный ответ:</label><div class="correct-options">';
            
            if (type === 'single') {
                options.forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    html += `
                        <div style="margin: 5px 0;">
                            <input type="radio" name="correct-${questionNum}" value="${idx}" id="c${questionNum}-${idx}">
                            <label for="c${questionNum}-${idx}">${letter}. ${opt.value || 'Вариант ' + letter}</label>
                        </div>
                    `;
                });
            } else {
                options.forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    html += `
                        <div style="margin: 5px 0;">
                            <input type="checkbox" name="correct-${questionNum}" value="${idx}" id="c${questionNum}-${idx}">
                            <label for="c${questionNum}-${idx}">${letter}. ${opt.value || 'Вариант ' + letter}</label>
                        </div>
                    `;
                });
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

async function createQuiz() {
    const title = document.getElementById('quizTitle').value.trim();
    const category = document.getElementById('quizCategory').value;
    
    if (!title) {
        alert('Введите название квиза');
        return;
    }

    const questions = [];
    let hasError = false;

    for (let i = 1; i <= currentQuestionCount; i++) {
        const questionText = document.getElementById(`question-${i}`).value.trim();
        const type = document.getElementById(`type-${i}`).value;
        const timeLimit = parseInt(document.getElementById(`time-${i}`).value);
        
        // Собираем все варианты
        const optionInputs = document.querySelectorAll(`#options-${i} .option-input`);
        const allOptions = [];
        optionInputs.forEach(inp => {
            if (inp.value.trim()) allOptions.push(inp.value.trim());
        });
        
        if (!questionText || allOptions.length < 2) {
            alert(`Заполните вопрос ${i} и минимум 2 варианта`);
            hasError = true;
            break;
        }
        
        // Определяем правильный ответ
        let correctAnswerText = '';
        if (type === 'single') {
            const selectedIndex = document.querySelector(`input[name="correct-${i}"]:checked`);
            if (!selectedIndex) {
                alert(`Выберите правильный ответ для вопроса ${i}`);
                hasError = true;
                break;
            }
            const idx = parseInt(selectedIndex.value);
            correctAnswerText = allOptions[idx];
        } else {
            const selectedIndices = Array.from(document.querySelectorAll(`input[name="correct-${i}"]:checked`));
            if (selectedIndices.length === 0) {
                alert(`Выберите хотя бы один правильный ответ для вопроса ${i}`);
                hasError = true;
                break;
            }
            // Для multiple choice будем хранить массив правильных ответов (текстом)
            correctAnswerText = selectedIndices.map(cb => allOptions[parseInt(cb.value)]);
        }
        
        // Формируем правильную структуру вопроса
        const questionData = {
            question: questionText,
            type: type,
            timeLimit: timeLimit,
            correctAnswer: correctAnswerText,
            wrongAnswers: []
        };

        // Заполняем wrongAnswers всеми вариантами, кроме правильных
        if (type === 'single') {
            questionData.wrongAnswers = allOptions.filter(opt => opt !== correctAnswerText);
        } else {
            // Для multiple choice правильный ответ — массив, значит wrongAnswers = все варианты не входящие в correctAnswer
            questionData.wrongAnswers = allOptions.filter(opt => !correctAnswerText.includes(opt));
        }
        
        questions.push(questionData);
    }
    
    if (hasError) return;

    try {
        const response = await fetch('/api/quizzes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, category, questions })
        });
        
        const result = await response.json();
        if (result.success) {
            document.getElementById('create-result').innerHTML = `
                <div class="success-message">
                    <h3>✅ Квиз создан!</h3>
                    <p><strong>Название:</strong> ${result.quiz.title}</p>
                    <p><strong>Предмет:</strong> ${getCategoryName(result.quiz.category)}</p>
                    <p><strong>Артикул:</strong> <span class="article-code">${result.quiz.article}</span></p>
                    <p><strong>Вопросов:</strong> ${result.quiz.questions.length}</p>
                    <p><strong>Сохраните артикул для доступа!</strong></p>
                </div>
            `;
            
            document.getElementById('quizTitle').value = '';
            generateQuestionFields();
        }
    } catch (e) {
        alert('Ошибка: ' + e.message);
    }
}

            return categories[code] || '📌 Другое';
        }

        async function searchQuizzes() {
            const query = document.getElementById('searchQuery').value.trim();
            const category = document.getElementById('categoryFilter').value;
            
            let url = '/api/quizzes/search?';
            if (query) url += `query=${encodeURIComponent(query)}&`;
            if (category && category !== 'all') url += `category=${category}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                displayQuizzes(data.results, 'search-results');
            } catch (e) {
                alert('Ошибка поиска');
            }
        }

        async function loadAllQuizzes() {
            try {
                const response = await fetch('/api/quizzes/all');
                const data = await response.json();
                displayQuizzes(data.quizzes, 'library-results');
            } catch (e) {
                alert('Ошибка загрузки');
            }
        }

        function displayQuizzes(quizzes, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (!quizzes || quizzes.length === 0) {
                container.innerHTML = '<p>Квизы не найдены</p>';
                return;
            }
            
            quizzes.forEach(quiz => {
                container.innerHTML += `
                    <div class="quiz-card">
                        <h3>${quiz.title}</h3>
                        <div class="quiz-meta">
                            <span class="category-badge">${quiz.categoryName || getCategoryName(quiz.category)}</span>
                            <span class="article-code">${quiz.article}</span>
                            <span>📊 ${quiz.questions.length} вопросов</span>
                            <span>📅 ${new Date(quiz.createdAt).toLocaleDateString()}</span>
                        </div>
                        <button class="btn btn-secondary" onclick="startSession('${quiz.article}')">🚀 Начать сессию</button>
                    </div>
                `;
            });
        }

        async function startSession(quizArticle) {
            try {
                const response = await fetch('/api/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quizArticle })
                });
                const data = await response.json();
                if (data.success) {
                    window.open(`/session/${data.session.code}`, '_blank');
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (e) {
                alert('Ошибка создания сессии');
            }
        }

        generateQuestionFields();
    </script>
</body>
</html>
